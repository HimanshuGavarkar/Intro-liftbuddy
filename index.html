<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftBuddy | Join the Community</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --text: #111827;
    --muted: #6b7280;
    --brand: #6a1b9a;
    --brand-2: #22c55e;
    --surface: rgba(255, 255, 255, 0.62);
    --stroke: rgba(255, 255, 255, 0.45);
    --shadow: 0 20px 45px rgba(17, 24, 39, 0.15);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    display: grid;
    place-items: center;
    text-align: center;
    padding: 28px 16px;
    background:
        radial-gradient(circle at 12% 15%, rgba(106, 27, 154, 0.09), transparent 33%),
        radial-gradient(circle at 88% 85%, rgba(34, 197, 94, 0.08), transparent 38%),
        linear-gradient(rgba(247, 252, 248, 0.28), rgba(238, 248, 242, 0.34)),
        url('background.png') center / cover no-repeat;
}

.container {
    width: min(100%, 460px);
    padding: 30px 22px 22px;
    border-radius: 28px;
    background: var(--surface);
    border: 1px solid var(--stroke);
    box-shadow: var(--shadow);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
    animation: fadeInUp 0.75s ease-out both;
}

.container::before {
    content: "";
    position: absolute;
    inset: -130px auto auto -100px;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(106, 27, 154, 0.16), transparent 65%);
    pointer-events: none;
}

.logo-circle {
    background: rgba(255, 255, 255, 0.95);
    width: 112px;
    height: 112px;
    border-radius: 999px;
    margin: 0 auto 18px;
    display: grid;
    place-items: center;
    box-shadow: 0 12px 28px rgba(17, 24, 39, 0.16);
    border: 1px solid rgba(255, 255, 255, 0.72);
    position: relative;
    z-index: 1;
    animation: float 4s ease-in-out infinite;
}

.logo-circle img {
    width: 78px;
}

h1 {
    font-size: clamp(2rem, 6vw, 2.45rem);
    margin: 6px 0 4px;
    font-weight: 700;
    letter-spacing: -0.4px;
    animation: fadeInUp 0.65s ease-out 0.1s both;
}

.subheading {
    color: var(--brand);
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 14px;
    animation: fadeInUp 0.65s ease-out 0.2s both;
}

.explore {
    color: var(--muted);
    margin: 0 0 18px;
    line-height: 1.5;
    font-size: 0.95rem;
    animation: fadeInUp 0.65s ease-out 0.3s both;
}

.explore u {
    text-decoration-thickness: 2px;
    text-underline-offset: 4px;
}

.link-card {
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.7);
    padding: 14px 16px;
    margin: 10px 0;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    color: #1f2937;
    font-size: 15px;
    font-weight: 600;
    box-shadow: 0 8px 20px rgba(17, 24, 39, 0.08);
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    animation: fadeInUp 0.55s ease-out both;
    position: relative;
    z-index: 1;
}

.link-card:nth-of-type(1) { animation-delay: 0.38s; }
.link-card:nth-of-type(2) { animation-delay: 0.46s; }
.link-card:nth-of-type(3) { animation-delay: 0.54s; }
.link-card:nth-of-type(4) { animation-delay: 0.62s; }
.link-card:nth-of-type(5) { animation-delay: 0.7s; }
.link-card:nth-of-type(6) { animation-delay: 0.78s; }

.link-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 26px rgba(17, 24, 39, 0.14);
    background: #fff;
}

.icon {
    font-size: 18px;
}

.icon-img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    display: block;
}

footer {
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted);
    animation: fadeIn 0.9s ease-out 0.8s both;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(22px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

@media (max-width: 420px) {
    .container {
        padding: 24px 16px 18px;
        border-radius: 22px;
    }

    .link-card {
        font-size: 14px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="logo-circle">
        <!-- Replace this with your logo image link -->
        <img src="logo.png" alt="LiftBuddy Logo">
    </div>

    <h1>LiftBuddy</h1>

    <div class="subheading">Join the LiftBuddy Community</div>

    <div class="explore">
        <u>Explore the following links<br>to learn more:</u>
    </div>

    <a class="link-card" href="https://play.google.com/store/apps/details?id=com.liftbuddy.liftbuddyapp" target="_blank" rel="noopener">
        <img src="playstore.png" alt="Play Store" class="icon-img">
        LiftBuddy Launching soon on Play Store
    </a>

    <a class="link-card" href="https://apps.apple.com" target="_blank" rel="noopener">
        <img src="appstore.png" alt="appstore" class="icon-img">
        LiftBuddy Launching soon on App Store
    </a>

    <a class="link-card" href="https://instagram.com/liftbuddy.in" target="_blank" rel="noopener">
        <img src="instagram.png" alt="Instagram" class="icon-img">
        @liftbuddy.in
    </a>

    <a class="link-card" href="https://liftbuddy.in" target="_blank" rel="noopener">
        <img src="www.png" alt="website" class="icon-img">
        https://liftbuddy.in
    </a>

    <a class="link-card" href="tel:+919752231105">
        <img src="phone.png" alt="phone call" class="icon-img">
        +91 9752231105
    </a>

    <a class="link-card" href="mailto:Gavarkarh@gmail.com">
        <img src="email.png" alt="email" class="icon-img">
        Gavarkarh@gmail.com
    </a>

    <footer>
        ©️ 2026 LiftBuddy | Community First. Products Later.
    </footer>

</div>

</body>
</html>
