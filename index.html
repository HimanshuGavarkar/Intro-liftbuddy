<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftBuddy | Join the Community</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(rgba(240,255,240,0.3), rgba(220,245,220,0.3)),
                url('background.png');
    background-size: cover;
    background-position: center;
    text-align: center;
    color: #000;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 30px 20px;
}

.logo-circle {
    background: white;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.logo-circle img {
    width: 90px;
}

h1 {
    font-size: 36px;
    margin: 10px 0;
    font-weight: 700;
}

.subheading {
    color: #6A1B9A;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
}

.explore {
    font-style: italic;
    margin: 20px 0;
}

.link-card {
    background: white;
    padding: 18px;
    margin: 15px 0;
    border-radius: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-decoration: none;
    color: #333;
    font-size: 16px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.link-card:hover {
    transform: scale(1.05);
}

.icon {
    font-size: 20px;
}

footer {
    margin-top: 30px;
    font-size: 12px;
    color: #555;
}

/* Animations */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.logo-circle {
    animation: float 3s ease-in-out infinite;
}

h1 {
    animation: fadeInUp 0.8s ease-out;
}

.subheading {
    animation: fadeInUp 0.8s ease-out 0.2s both;
}

.explore {
    animation: fadeInUp 0.8s ease-out 0.4s both;
}

.link-card {
    animation: fadeInUp 0.6s ease-out both;
}

.link-card:nth-child(1) { animation-delay: 0.5s; }
.link-card:nth-child(2) { animation-delay: 0.6s; }
.link-card:nth-child(3) { animation-delay: 0.7s; }
.link-card:nth-child(4) { animation-delay: 0.8s; }

.link-card:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

footer {
    animation: fadeIn 1s ease-out 1s both;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo-circle">
        <!-- Replace this with your logo image link -->
        <img src="logo.png" alt="LiftBuddy Logo">
    </div>

    <h1>LiftBuddy</h1>

    <div class="subheading">Join the LiftBuddy Community</div>

    <div class="explore">
        <u>Explore the following links<br>to learn more:</u>
    </div>

    <a class="link-card" href="https://instagram.com/liftbuddy.in" target="_blank">
        <span class="icon">📸</span>
        @liftbuddy.in
    </a>

    <a class="link-card" href="https://liftbuddy.in" target="_blank">
        <span class="icon">🌐</span>
        https://liftbuddy.in
    </a>

    <a class="link-card" href="tel:+919752231105">
        <span class="icon">📞</span>
        +91 9752231105
    </a>

    <a class="link-card" href="mailto:Gavarkarh@gmail.com">
        <span class="icon">📧</span>
        Gavarkarh@gmail.com
    </a>

    <footer>
        ©️ 2026 LiftBuddy | Community First. Products Later.
    </footer>

</div>

</body>
</html>
